server: # REST and WS server
  port: 2333
  address: 0.0.0.0
lavalink:
  plugins:
    # Auto-downloaded from Maven Central on startup (needs internet the first time).
    # Replaces the broken built-in YouTube source with the maintained plugin.
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      snapshot: false
  server:
    password: "youshallnotpass"
    sources:
      # Disabled: the built-in YouTube source is deprecated/broken. The plugin
      # above handles YouTube instead.
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters: # All filters are enabled by default
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

plugins:
  youtube:
    enabled: true
    allowSearch: true          # enables "ytsearch:" / "ytmsearch:" queries
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    # Clients are tried in order; this mix is the current reliable default.
    clients:
      - MUSIC
      - WEB
      - WEBEMBEDDED
      - ANDROID_VR

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

sentry:
  dsn: ""
  environment: ""

logging:
  file:
    path: ./logs/

  level:
    root: INFO
    lavalink: INFO

  logback:
    rollingpolicy:
      max-file-size: 1GB
      max-history: 30
